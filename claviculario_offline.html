<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claviculário Digital</title>
<style>
:root {
  --bg:#f5f3ee;--surface:#fff;--surface2:#f0ede6;--border:#ddd9d0;--border2:#c8c3b8;
  --text:#1a1814;--text2:#6b6760;--text3:#9e9b95;
  --accent:#2d4a3e;--accent2:#1e3329;--accent-light:#e8f0ec;
  --danger:#8b2c2c;--danger-bg:#fdf0f0;--danger-b:#e8c4c4;
  --warn:#7a5c1a;--warn-bg:#fdf6e8;--warn-b:#e8d8a0;
  --ok:#2d5c3a;--ok-bg:#edf5ef;--ok-b:#b8d8be;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif;
  --mono:'Courier New',Courier,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;font-size:15px}

/* HEADER */
.header{background:var(--accent);color:#fff;padding:0 1.5rem;height:58px;display:flex;align-items:center;justify-content:space-between;gap:12px;position:sticky;top:0;z-index:50}
.hbrand{display:flex;align-items:center;gap:10px}
.hlogo{width:34px;height:34px;background:rgba(255,255,255,.15);border-radius:8px;display:flex;align-items:center;justify-content:center}
.htitle{font-size:16px;font-weight:600;letter-spacing:-.01em}
.hsub{font-size:11px;opacity:.6;margin-top:1px}
.hstats{display:flex;gap:6px}
.hpill{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.15);border-radius:20px;padding:4px 12px;font-size:12px;font-weight:500;display:flex;align-items:center;gap:5px}
.hpill-warn{background:rgba(240,200,60,.18);border-color:rgba(240,200,60,.3);color:#ffd85e;cursor:pointer;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.6}}

/* TOOLBAR */
.toolbar{background:var(--surface);border-bottom:1px solid var(--border);padding:.65rem 1.5rem;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.sw{position:relative;flex:1;min-width:180px}
.sw svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);pointer-events:none;opacity:.4}
input[type=text]{width:100%;padding:7px 10px 7px 32px;font-size:13px;font-family:var(--font);border:1px solid var(--border);border-radius:7px;background:var(--surface);color:var(--text);outline:none;transition:border .15s}
input[type=text]:focus{border-color:var(--accent)}
select,button{font-family:var(--font);font-size:13px;border:1px solid var(--border);border-radius:7px;outline:none;cursor:pointer;transition:all .15s}
select{padding:7px 10px;background:var(--surface);color:var(--text)}
select:focus{border-color:var(--accent)}
button{padding:7px 13px;background:var(--surface);color:var(--text);display:inline-flex;align-items:center;gap:6px;font-weight:500;white-space:nowrap}
button:hover{background:var(--surface2);border-color:var(--border2)}
.btn-a{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-a:hover{background:var(--accent2);border-color:var(--accent2)}
.btn-d{background:var(--danger-bg);color:var(--danger);border-color:var(--danger-b)}
.btn-d:hover{background:#f5dada}

/* GRID */
.gwrap{padding:1.25rem 1.5rem}
.glabel{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:.75rem}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(70px,1fr));gap:5px}
.kc{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:9px 5px 7px;cursor:pointer;text-align:center;transition:border .15s,background .15s,transform .1s;user-select:none}
.kc:hover{border-color:var(--border2);transform:translateY(-1px)}
.kc:active{transform:scale(.97)}
.kc.taken{background:var(--danger-bg);border-color:var(--danger-b)}
.kc.alert{background:var(--warn-bg);border-color:var(--warn-b);animation:pulse 2.5s ease-in-out infinite}
@keyframes pulse{0%,100%{border-color:var(--warn-b)}50%{border-color:#c8a040}}
.kicon{font-size:15px;margin-bottom:3px;line-height:1}
.knum{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--text)}
.kc.taken .knum{color:var(--danger)}
.kc.alert .knum{color:var(--warn)}
.kname{font-size:8.5px;color:var(--text3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.kc.taken .kname{color:var(--danger);opacity:.8}
.kc.alert .kname{color:var(--warn);opacity:.8}

/* PANEL */
.panel{background:var(--surface);border-top:1px solid var(--border);padding:1.25rem 1.5rem}
.ptitle{font-size:12px;font-weight:600;color:var(--text2);letter-spacing:.04em;text-transform:uppercase;margin-bottom:.875rem;display:flex;align-items:center;gap:7px}
.litem{border:1px solid var(--border);border-radius:8px;padding:9px 12px;display:flex;align-items:center;gap:10px;font-size:13px;background:var(--surface2);margin-bottom:5px}
.litem.wi{background:var(--warn-bg);border-color:var(--warn-b)}
.lnum{font-family:var(--mono);font-weight:600;font-size:13px;min-width:28px;color:var(--text)}
.linfo{flex:1;min-width:0}
.lname{font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ltime{font-size:11px;color:var(--text3);margin-top:1px}
.lelapsed{font-size:11px;font-weight:600;padding:2px 7px;border-radius:4px;border:1px solid var(--border);background:var(--surface);color:var(--text2);white-space:nowrap;flex-shrink:0}
.lelapsed.w{background:var(--warn-bg);border-color:var(--warn-b);color:var(--warn)}
.empty{text-align:center;padding:1.75rem;color:var(--text3);font-size:13px}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:200;align-items:center;justify-content:center;padding:1rem}
.overlay.open{display:flex}
.modal{background:var(--surface);border-radius:12px;border:1px solid var(--border);padding:1.5rem;width:360px;max-width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.1)}
.mh2{font-size:16px;font-weight:600;margin-bottom:.2rem;display:flex;align-items:center;gap:7px}
.msub{font-size:12px;color:var(--text3);margin-bottom:1.1rem}
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:4px}
.field input[type=text]{padding:8px 11px}
.mact{display:flex;gap:8px;margin-top:1.1rem;justify-content:flex-end}
.abox{background:var(--warn-bg);border:1px solid var(--warn-b);border-radius:8px;padding:9px 13px;font-size:12px;color:var(--warn);margin-bottom:1rem;line-height:1.5}
.infobox{font-size:13px;line-height:1.8;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:11px 13px;margin-bottom:1rem}
.hist-item{border-bottom:1px solid var(--border);padding:9px 0;display:flex;align-items:flex-start;gap:9px;font-size:13px}
.hist-item:last-child{border:none}
.hdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}
.hdot.taken{background:var(--danger)}
.hdot.returned{background:var(--ok)}
.hkey{font-family:var(--mono);font-size:11px;color:var(--text3)}
.htime{font-size:11px;color:var(--text3);margin-top:1px}

/* TOAST */
.toast{position:fixed;bottom:22px;right:22px;background:var(--text);color:#fff;border-radius:8px;padding:9px 16px;font-size:13px;font-weight:500;z-index:300;transform:translateY(16px);opacity:0;transition:all .22s;pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}


/* CALENDÁRIO */
.cal-modal{width:380px!important;max-width:96vw!important}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.cal-nav button{padding:5px 12px;font-size:12px;font-family:var(--font);font-weight:500;border:1px solid var(--border);border-radius:6px;background:var(--surface);color:var(--text);cursor:pointer}
.cal-nav button:hover{background:var(--surface2)}
.cal-month{font-size:13px;font-weight:600;color:var(--text);text-transform:capitalize}
.cal-table{width:100%;border-collapse:collapse;margin-bottom:8px;table-layout:fixed}
.cal-table th{font-size:10px;font-weight:600;color:var(--text3);text-align:center;padding:4px 0;text-transform:uppercase;width:calc(100%/7)}
.cal-table td{text-align:center;padding:2px}
.cal-cell{display:inline-flex;align-items:center;justify-content:center;width:36px;height:32px;border-radius:6px;font-size:12px;cursor:pointer;border:1px solid transparent;transition:all .12s;color:var(--text);font-weight:400;margin:0 auto}
.cal-cell:hover{background:var(--surface2);border-color:var(--border)}
.cal-cell.has-data{font-weight:700;background:var(--accent-light);color:var(--accent)}
.cal-cell.has-data:hover{background:#c8ddd4}
.cal-cell.today{border-color:var(--accent);font-weight:700}
.cal-cell.selected{background:var(--accent)!important;color:#fff!important;border-color:var(--accent)!important}
.cal-cell.no-data{color:var(--text3);opacity:.35;cursor:not-allowed;pointer-events:none}
.cal-legend{display:flex;gap:12px;margin-bottom:10px;font-size:10px;color:var(--text3)}
.cal-legend span{display:flex;align-items:center;gap:4px}
.cal-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.cal-selbox{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:8px 12px;font-size:12px;color:var(--text2);margin-bottom:.75rem}

/* TURNO */
.hpill-turno{background:rgba(255,255,255,.18);border-color:rgba(255,255,255,.25);cursor:pointer}
.hpill-turno:hover{background:rgba(255,255,255,.28)}
.hpill-turno .tp-nome{font-weight:600;max-width:120px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.turno-banner{background:var(--accent-light);border-bottom:1px solid #b8d4c4;padding:8px 1.5rem;display:flex;align-items:center;gap:10px;font-size:13px;color:var(--accent)}
.turno-banner b{font-weight:600}
.turno-banner .tb-since{font-size:11px;opacity:.75;margin-left:4px}
.turno-banner .tb-btn{margin-left:auto;padding:4px 12px;font-size:12px;font-family:var(--font);font-weight:600;border:1px solid var(--accent);border-radius:6px;background:transparent;color:var(--accent);cursor:pointer}
.turno-banner .tb-btn:hover{background:var(--accent);color:#fff}

/* MULTI-SELECT */
.kc.selected{border-color:var(--accent);background:var(--accent-light);box-shadow:0 0 0 2px var(--accent)}
.kc.selected .knum{color:var(--accent)}
.kc.selected .kname{color:var(--accent)}
.kc.selected .kicon::after{content:'✓';position:absolute;top:3px;right:4px;font-size:9px;font-weight:700;color:var(--accent)}
.kc{position:relative}
.multibar{position:fixed;bottom:0;left:0;right:0;background:var(--accent);color:#fff;padding:14px 1.5rem;display:flex;align-items:center;justify-content:space-between;gap:12px;z-index:100;transform:translateY(100%);transition:transform .25s ease;box-shadow:0 -4px 20px rgba(0,0,0,.15)}
.multibar.show{transform:translateY(0)}
.multibar-info{font-size:14px;font-weight:500}
.multibar-info span{font-size:12px;opacity:.75;margin-left:6px}
.multibar-keys{font-size:11px;opacity:.7;margin-top:2px;max-width:400px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.multibar-actions{display:flex;gap:8px;flex-shrink:0}
.mbbtn{padding:8px 16px;font-size:13px;font-family:var(--font);font-weight:600;border-radius:7px;cursor:pointer;border:none;white-space:nowrap}
.mbbtn-cancel{background:rgba(255,255,255,.15);color:#fff}
.mbbtn-cancel:hover{background:rgba(255,255,255,.25)}
.mbbtn-ok{background:#fff;color:var(--accent)}
.mbbtn-ok:hover{background:#f0f0f0}
.btn-multi{background:var(--accent-light);color:var(--accent);border-color:var(--accent)!important}
.btn-multi.active{background:var(--accent);color:#fff}

@media(max-width:560px){
  .header{padding:0 1rem}.hstats{display:none}
  .toolbar,.gwrap,.panel{padding-left:1rem;padding-right:1rem}
  .grid{grid-template-columns:repeat(auto-fill,minmax(60px,1fr))}
}
</style>
</head>
<body>

<div class="header">
  <div class="hbrand">
    <div class="hlogo">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>
    </div>
    <div>
      <div class="htitle">Claviculário Digital</div>
      <div class="hsub" id="last-sync">Iniciando...</div>
    </div>
  </div>
  <div class="hstats">
    <div class="hpill">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
      <span id="h-avail">—</span> disponíveis
    </div>
    <div class="hpill">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      <span id="h-taken">—</span> em uso
    </div>
    <div class="hpill hpill-turno" onclick="openTurno()" title="Clique para trocar o porteiro">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span id="h-porteiro">Sem porteiro</span>
    </div>
    <div class="hpill hpill-warn" id="h-wpill" style="display:none" onclick="setFilter('alert')">
      ⚠️ <span id="h-walert">0</span> alerta +5h
    </div>
  </div>
</div>

<!-- BANNER DE TURNO -->
<div class="turno-banner" id="turno-banner" style="display:none">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
  <span>Porteiro de plantão: <b id="tb-nome">—</b> <span class="tb-since" id="tb-since"></span></span>
  <button class="tb-btn" onclick="openTurno()">Trocar turno</button>
</div>


<div class="toolbar">
  <div class="sw">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="search" placeholder="Buscar número, nome ou responsável..." oninput="renderGrid()">
  </div>
  <select id="filter" onchange="renderGrid()">
    <option value="all">Todas as chaves</option>
    <option value="available">Disponíveis</option>
    <option value="taken">Em uso</option>
    <option value="alert">Alertas +5h</option>
  </select>
  <button onclick="openHistory()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg>
    Histórico
  </button>
  <button class="btn-a" onclick="openCalendario()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    Relatório do dia
  </button>
  <button onclick="exportCompleto()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    Histórico completo
  </button>
  <button id="btn-multi" onclick="toggleMulti()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
    Selecionar várias
  </button>
  <button onclick="openConfig()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93A10 10 0 0 0 4.93 19.07M19.07 4.93l-2.83 2.83M4.93 19.07l2.83-2.83"/></svg>
    Config
  </button>
</div>

<div class="gwrap">
  <div class="glabel" id="grid-label">80 Chaves</div>
  <div class="grid" id="key-grid"></div>
</div>

<div class="panel">
  <div class="ptitle">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    Chaves em uso agora
  </div>
  <div id="active-log"></div>
</div>


<!-- MULTI-SELECT BAR -->
<div class="multibar" id="multibar">
  <div>
    <div class="multibar-info" id="mb-info">0 chaves selecionadas</div>
    <div class="multibar-keys" id="mb-keys"></div>
  </div>
  <div class="multibar-actions">
    <button class="mbbtn mbbtn-cancel" onclick="cancelMulti()">Cancelar</button>
    <button class="mbbtn mbbtn-ok" id="mb-ok" onclick="openMultiTake()" disabled>
      Registrar retirada
    </button>
  </div>
</div>

<div class="overlay" id="overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal-body"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const SK = 'claviculario_v3';
const ALERT_H = 5;
let keys = {}, log = [], cfg = {orgName:'Minha Empresa', totalKeys:80};
let turno = {porteiro:'', desde:null, historico:[]};

// ── STORAGE ──────────────────────────────────────────────
function load() {
  try {
    const raw = localStorage.getItem(SK);
    if (raw) { const d=JSON.parse(raw); keys=d.keys||{}; log=d.log||[]; if(d.cfg) cfg=Object.assign(cfg,d.cfg); if(d.turno) turno=Object.assign(turno,d.turno); }
  } catch(e){}
  for (let i=1;i<=80;i++) if(!keys[i]) keys[i]={status:'available',person:'',takenAt:null,label:'Chave '+i};
}
function save() {
  try { localStorage.setItem(SK,JSON.stringify({keys,log,cfg,turno})); } catch(e){}
  document.getElementById('last-sync').textContent='Salvo às '+hm();
}

// ── UTILS ────────────────────────────────────────────────
function hm(){ return new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}); }
function fdt(ts){ return ts?new Date(ts).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}):'—'; }
function elap(ts){
  if(!ts)return'';
  const m=Math.floor((Date.now()-ts)/60000);
  if(m<1)return'<1min';
  if(m<60)return m+'min';
  const h=Math.floor(m/60),rm=m%60;
  return h+'h'+(rm?rm+'min':'');
}
function gs(k){
  if(k.status==='available')return'available';
  if(k.takenAt&&(Date.now()-k.takenAt)/3600000>=ALERT_H)return'alert';
  return'taken';
}
function pad(n){return String(n).padStart(2,'0');}

// ── STATS ────────────────────────────────────────────────
function updateStats(){
  let av=0,ta=0,al=0;
  for(let i=1;i<=80;i++){const s=gs(keys[i]);if(s==='available')av++;else ta++;if(s==='alert')al++;}
  document.getElementById('h-avail').textContent=av;
  document.getElementById('h-taken').textContent=ta;
  const p=document.getElementById('h-wpill');
  if(al>0){p.style.display='flex';document.getElementById('h-walert').textContent=al;}else p.style.display='none';
  document.getElementById('last-sync').textContent='Salvo às '+hm();
  // Update tab title
  if(al>0) document.title='⚠️ Claviculário ('+al+' alerta)';
  else document.title='Claviculário Digital';
}

// ── GRID ─────────────────────────────────────────────────
function renderGrid(){
  const q=document.getElementById('search').value.toLowerCase();
  const f=document.getElementById('filter').value;
  const g=document.getElementById('key-grid');
  let html='',count=0;
  for(let i=1;i<=80;i++){
    const k=keys[i],s=gs(k);
    if(f!=='all'&&f!==s)continue;
    if(q&&!String(i).includes(q)&&!(k.person||'').toLowerCase().includes(q)&&!(k.label||'').toLowerCase().includes(q))continue;
    count++;
    const ic=s==='available'?'🔑':s==='alert'?'⚠️':'🔒';
    const nm=s==='available'?'livre':(k.person||'—');
    html+=`<div class="kc ${s}" onclick="openKey(${i})" title="${k.label} — ${nm}">
      <div class="kicon">${ic}</div>
      <div class="knum">${pad(i)}</div>
      <div class="kname">${nm}</div>
    </div>`;
  }
  if(!html)html='<div class="empty" style="grid-column:1/-1">Nenhuma chave encontrada</div>';
  g.innerHTML=html;
  document.getElementById('grid-label').textContent=count+' chave'+(count!==1?'s':'')+(f!=='all'?' (filtrado)':'');
}

// ── ACTIVE LOG ────────────────────────────────────────────
function renderActiveLog(){
  const c=document.getElementById('active-log');
  const taken=[];
  for(let i=1;i<=80;i++)if(keys[i].status==='taken')taken.push(i);
  if(!taken.length){c.innerHTML='<div class="empty">Nenhuma chave em uso no momento ✅</div>';return;}
  // Sort: alerts first
  taken.sort((a,b)=>{
    const sa=gs(keys[a]),sb=gs(keys[b]);
    if(sa==='alert'&&sb!=='alert')return-1;
    if(sb==='alert'&&sa!=='alert')return 1;
    return (keys[a].takenAt||0)-(keys[b].takenAt||0);
  });
  let html='';
  taken.forEach(i=>{
    const k=keys[i],s=gs(k),el=elap(k.takenAt),isA=s==='alert';
    html+=`<div class="litem${isA?' wi':''}">
      <div class="lnum">#${pad(i)}</div>
      <div class="linfo">
        <div class="lname">${k.person||'—'}${isA?' <span style="font-size:11px;color:var(--warn)">⚠️ +5h</span>':''}</div>
        <div class="ltime">${fdt(k.takenAt)}</div>
      </div>
      ${el?`<span class="lelapsed${isA?' w':''}">${el}</span>`:''}
      <button class="btn-d" onclick="doReturn(${i},event)" style="padding:5px 10px;font-size:12px;border-radius:6px">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
        Devolver
      </button>
    </div>`;
  });
  c.innerHTML=html;
}

let multiMode = false;

function toggleMulti(){
  multiMode = !multiMode;
  const btn = document.getElementById('btn-multi');
  if(multiMode){
    btn.classList.add('active');
    btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg> Modo seleção ativo';
  } else {

    updateMultiBar();

function toggleSelect(i){
  if(selected.has(i)) selected.delete(i);
  else selected.add(i);

  renderGrid();
}

function updateMultiBar(){
  const bar = document.getElementById('multibar');
  const info = document.getElementById('mb-info');
  const keysEl = document.getElementById('mb-keys');
  const okBtn = document.getElementById('mb-ok');
  const n = selected.size;
  if(n > 0){
    bar.classList.add('show');

// ── ACTIONS ──────────────────────────────────────────────
function doTake(i){
  const person=document.getElementById('mp').value.trim();
  const label=document.getElementById('ml').value.trim();
  if(!person)return;
  keys[i]={status:'taken',person,takenAt:Date.now(),label:label||keys[i].label};
  log.unshift({key:i,person,action:'taken',time:Date.now()});
  save();render();closeModal();
  toast('Chave #'+pad(i)+' registrada para '+person);
}
function doReturn(i,e){
  if(e)e.stopPropagation();
  const k=keys[i];
  log.unshift({key:i,person:k.person,action:'returned',time:Date.now(),takenAt:k.takenAt});
  keys[i]={status:'available',person:'',takenAt:null,label:k.label};
  save();render();
  toast('Chave #'+pad(i)+' devolvida ✓');
}

// ── CALENDÁRIO DE RELATÓRIO ───────────────────────────────
let calYear = new Date().getFullYear();
let calMonth = new Date().getMonth();
let calSelected = null;

function openCalendario(){
  calYear = new Date().getFullYear();
  calMonth = new Date().getMonth();
  calSelected = null;
  renderCalModal();
}

function renderCalModal(){
  const m = document.getElementById('modal-body');
  m.classList.add('cal-modal');

  // Dias com dados
  const diasComDados = new Set();
  log.forEach(l=>{
    const d=new Date(l.time);
    diasComDados.add(d.getFullYear()+'-'+d.getMonth()+'-'+d.getDate());
  });

  const hoje = new Date();
  const nomeMes = new Date(calYear,calMonth,1).toLocaleDateString('pt-BR',{month:'long',year:'numeric'});
  const primeiroDia = new Date(calYear,calMonth,1).getDay();
  const ultimoDia = new Date(calYear,calMonth+1,0).getDate();
  const dows = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];

  // Montar semanas em linhas de tabela
  let dias = [];
  for(let i=0;i<primeiroDia;i++) dias.push(null);
  for(let d=1;d<=ultimoDia;d++) dias.push(d);
  while(dias.length%7!==0) dias.push(null);

  let linhas='';
  for(let s=0;s<dias.length;s+=7){
    linhas+='<tr>';
    for(let col=0;col<7;col++){
      const d=dias[s+col];
      if(!d){ linhas+='<td></td>'; continue; }
      const dataKey=calYear+'-'+calMonth+'-'+d;
      const isHoje=d===hoje.getDate()&&calMonth===hoje.getMonth()&&calYear===hoje.getFullYear();
      const temDados=diasComDados.has(dataKey);
      const isFuturo=new Date(calYear,calMonth,d)>hoje;
      const isSel=calSelected&&calSelected.d===d&&calSelected.m===calMonth&&calSelected.y===calYear;
      let cls='cal-cell';
      if(isSel) cls+=' selected';
      else if(isFuturo) cls+=' no-data';
      else if(temDados) cls+=' has-data';
      if(isHoje&&!isSel) cls+=' today';
      const click=isFuturo?'':'onclick="selectCalDay('+d+','+calMonth+','+calYear+')"';
      linhas+='<td><div class="'+cls+'" '+click+'>'+d+'</div></td>';
    }
    linhas+='</tr>';
  }

  const ths=dows.map(d=>'<th>'+d+'</th>').join('');
  const selLabel=calSelected
    ?new Date(calSelected.y,calSelected.m,calSelected.d).toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long'})
    :'Nenhum dia selecionado';

  m.innerHTML=
    '<div class="mh2"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg> Escolher data do relatório</div>'
    +'<div class="msub">Selecione o dia para gerar o PDF</div>'
    +'<div class="cal-nav">'
    +'<button onclick="calNavegar(-1)">‹ Anterior</button>'
    +'<span class="cal-month">'+nomeMes+'</span>'
    +'<button onclick="calNavegar(1)">Próximo ›</button>'
    +'</div>'
    +'<table class="cal-table"><thead><tr>'+ths+'</tr></thead><tbody>'+linhas+'</tbody></table>'
    +'<div class="cal-legend">'
    +'<span><div class="cal-dot" style="background:var(--accent-light);border:1px solid #b8d4c4"></div>Com movimentações</span>'
    +'<span><div class="cal-dot" style="border:2px solid var(--accent)"></div>Hoje</span>'
    +'</div>'
    +'<div class="cal-selbox">📅 <b>Selecionado:</b> '+selLabel+'</div>'
    +'<div class="mact">'
    +'<button onclick="closeModal()">Cancelar</button>'
    +'<button class="btn-a" id="cal-ok" onclick="gerarRelatorioDia()" '+(calSelected?'':'disabled')+'>Gerar PDF</button>'
    +'</div>';

  document.getElementById('overlay').classList.add('open');
}

function calNavegar(dir){
  calMonth += dir;
  if(calMonth < 0){ calMonth=11; calYear--; }
  if(calMonth > 11){ calMonth=0; calYear++; }
  renderCalModal();
}

function selectCalDay(d,m,y){
  calSelected = {d,m,y};
  renderCalModal();
}

function gerarRelatorioDia(){
  if(!calSelected) return;
  const {d,m,y} = calSelected;
  closeModal();
  exportCSV(new Date(y,m,d));
}

// ── EXPORT PDF ───────────────────────────────────────────
function exportCSV(dataAlvo){
  const today = dataAlvo || new Date();
  const todayStr = today.toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long',year:'numeric'});
  const todayStrShort = today.toLocaleDateString('pt-BR');
  const geradoEm = today.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  const startOfDay = new Date(today); startOfDay.setHours(0,0,0,0);
  const endOfDay   = new Date(today); endOfDay.setHours(23,59,59,999);

  const logsToday = log.filter(l=>{ const d=new Date(l.time); return d>=startOfDay&&d<=endOfDay; });

  const pairs = [];
  const taken = {};
  const chrono = [...logsToday].reverse();
  chrono.forEach(l=>{
    if(l.action==='taken'){ taken[l.key]=l; }
    else if(l.action==='returned'&&taken[l.key]){
      pairs.push({key:l.key,person:taken[l.key].person,takenAt:taken[l.key].time,returnedAt:l.time});
      delete taken[l.key];
    }
  });
  Object.values(taken).forEach(l=>{ pairs.push({key:l.key,person:l.person,takenAt:l.time,returnedAt:null}); });
  pairs.sort((a,b)=>a.takenAt-b.takenAt);

  if(!pairs.length){ toast('Nenhuma movimentação registrada hoje'); return; }

  const org = cfg.orgName || 'Claviculário Digital';
  const total = pairs.length;
  const devolvidas = pairs.filter(p=>p.returnedAt).length;
  const pendentes  = pairs.filter(p=>!p.returnedAt).length;

  const linhas = pairs.map((p,idx)=>{
    const label = keys[p.key]?keys[p.key].label:'Chave '+p.key;
    const tak = new Date(p.takenAt).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    const ret = p.returnedAt ? new Date(p.returnedAt).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}) : '—';
    const isPendente = !p.returnedAt;
    const bg = idx%2===0 ? '#f9f8f6' : '#ffffff';
    const retStyle = isPendente ? 'color:#8b2c2c;font-weight:600' : 'color:#2d5c3a;font-weight:600';
    const pendBadge = isPendente ? ' <span style="font-size:9px;background:#fdf0f0;border:1px solid #e8c4c4;border-radius:3px;padding:1px 5px;color:#8b2c2c;margin-left:4px">PENDENTE</span>' : '';
    return '<tr style="background:'+bg+'">'
      +'<td style="text-align:center;font-weight:700;font-family:monospace">'+String(p.key).padStart(2,'0')+'</td>'
      +'<td>'+label+'</td>'
      +'<td>'+p.person+'</td>'
      +'<td style="text-align:center;font-family:monospace">'+tak+'</td>'
      +'<td style="text-align:center;font-family:monospace;'+retStyle+'">'+ret+pendBadge+'</td>'
      +'</tr>';
  }).join('');

  const html = '<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8">'
    +'<title>Relatorio '+todayStrShort+'</title>'
    +'<style>'
    +'@page{size:A4;margin:18mm 16mm 16mm 16mm}'
    +'*{box-sizing:border-box;margin:0;padding:0}'
    +'body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;color:#1a1814;font-size:12px;background:#fff}'
    +'.header{background:#2d4a3e;color:#fff;padding:20px 24px 18px;border-radius:6px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:flex-end}'
    +'.hl .org{font-size:10px;opacity:.7;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}'

    +'table{width:100%;border-collapse:collapse;border:1px solid #ddd9d0;border-radius:6px;overflow:hidden}'
    +'thead tr{background:#2d4a3e;color:#fff}'

    +'@media print{body{-webkit-print-color-adjust:exact;print-color-adjust:exact}}'
    +'</style></head><body>'

  const w = window.open('','_blank');

function exportCompleto(){
  const org=cfg.orgName||'';
  let c='\uFEFF';
  c+=org?`Organização: ${org}\n`:'';
  c+=`Exportado em: ${new Date().toLocaleString('pt-BR')}\n\n`;
  c+='SITUAÇÃO ATUAL\n';
  c+='Número;Descrição;Responsável;Retirada em;Tempo fora;Status\n';
  for(let i=1;i<=80;i++){
    const k=keys[i],s=gs(k);
    c+=`${i};"${k.label}";"${k.person||''}";"${k.takenAt?fdt(k.takenAt):''}";"${k.takenAt?elap(k.takenAt):''}";"${s==='available'?'Disponível':s==='alert'?'ALERTA >5h':'Em uso'}"\n`;
  }
  c+='\nHISTÓRICO COMPLETO\n';
  c+='Chave;Responsável;Ação;Horário\n';
  log.forEach(l=>{c+=`${l.key};"${l.person}";"${l.action==='taken'?'Retirada':'Devolução'}";"${fdt(l.time)}"\n`;});
  const b=new Blob([c],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(b);
  a.download='historico_completo_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
  toast('Histórico completo exportado');
}

// ── MISC ─────────────────────────────────────────────────
function setFilter(v){document.getElementById('filter').value=v;renderGrid();}
function closeModal(){document.getElementById('overlay').classList.remove('open');document.getElementById('modal-body').classList.remove('cal-modal');}
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),3000);
}
function render(){renderGrid();renderActiveLog();updateStats();updateTurnoUI();}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

// ── INIT ─────────────────────────────────────────────────
load();render();
setInterval(()=>{updateStats();renderGrid();renderActiveLog();},60000);
</script>
